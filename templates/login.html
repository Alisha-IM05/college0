<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>College0 — Login</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-hover);
      width: 100%;
      max-width: 400px;
      border: 1px solid var(--border);
    }
    .login-box h1 { text-align: center; margin-bottom: .25rem; font-size: 1.8rem; }
    .login-box .subtitle { text-align: center; color: var(--muted); font-size: .875rem; margin-bottom: 1.75rem; }
    .login-box .btn { width: 100%; justify-content: center; padding: 10px; font-size: .95rem; margin-top: .5rem; }
    .error { color: #721c24; background: #f8d7da; border: 1px solid #f5c6cb; border-radius: 6px; padding: 8px 12px; text-align: center; margin-top: .75rem; font-size: .875rem; }
    .divider { text-align: center; color: var(--muted); font-size: .8rem; margin: 1.5rem 0 1rem; }
    .quick-btns { display: flex; gap: .5rem; flex-wrap: wrap; }
    .quick-btns form { flex: 1; min-width: 120px; }
    .quick-btns .btn { font-size: .8rem; padding: 8px 6px; }
    .btn-registrar  { background: #c0392b !important; }
    .btn-instructor { background: #27ae60 !important; }
    .btn-student1   { background: #2980b9 !important; }
    .btn-student2   { background: #8e44ad !important; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>College0</h1>
    <p class="subtitle">AI-Enabled College Program System</p>

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <div class="divider">— Quick Login (Demo) —</div>
    <div class="quick-btns">
      <form method="POST" action="/login">
        <input type="hidden" name="username" value="registrar1">
        <input type="hidden" name="password" value="password123">
        <button type="submit" class="btn btn-primary btn-registrar">🏛 Registrar</button>
      </form>
      <form method="POST" action="/login">
        <input type="hidden" name="username" value="instructor1">
        <input type="hidden" name="password" value="password123">
        <button type="submit" class="btn btn-primary btn-instructor">👨‍🏫 Instructor</button>
      </form>
      <form method="POST" action="/login">
        <input type="hidden" name="username" value="student1">
        <input type="hidden" name="password" value="password123">
        <button type="submit" class="btn btn-primary btn-student1">🎓 Student 1</button>
      </form>
      <form method="POST" action="/login">
        <input type="hidden" name="username" value="student2">
        <input type="hidden" name="password" value="password123">
        <button type="submit" class="btn btn-primary btn-student2">🎓 Student 2</button>
      </form>
    </div>
  </div>
  <script src="/static/script.js"></script>
</body>
</html>
