{% extends "base.html" %}
{% block title %}Taboo Words — College0{% endblock %}

{% block content %}
<h1 class="page-title">Taboo Word Manager</h1>

<div class="card mb-2">
  <h2 style="margin-bottom:1rem;">Add a Taboo Word</h2>
  <form method="POST" action="/taboo/add" style="display:flex;gap:.75rem;align-items:flex-end;flex-wrap:wrap;">
    <div class="form-group" style="margin:0;flex:1;min-width:200px;">
      <label>Word or phrase to ban</label>
      <input type="text" name="word" placeholder="Enter word..." required />
    </div>
    <button type="submit" class="btn btn-primary">Add Word</button>
  </form>
</div>

<div class="card">
  <h2 style="margin-bottom:1rem;">Current Taboo Words</h2>
  {% if words %}
  <div style="display:flex;flex-wrap:wrap;gap:.5rem;">
    {% for word in words %}
    <span style="display:inline-flex;align-items:center;gap:.5rem;background:#f8d7da;color:#721c24;padding:6px 12px;border-radius:99px;font-size:.875rem;border:1px solid #f5c6cb;">
      {{ word }}
      <a href="/taboo/remove/{{ word }}" style="color:#721c24;font-weight:700;text-decoration:none;line-height:1;" title="Remove">✕</a>
    </span>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty-state">
    <div class="icon">🔤</div>
    No taboo words added yet.
  </div>
  {% endif %}
</div>
{% endblock %}
