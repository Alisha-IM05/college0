<!DOCTYPE html>
<html>
<head>
    <title>College0 - Taboo Words</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; margin: 0; }
        .navbar {
            background-color: #2E4A7A;
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
        }
        .navbar h1 { margin: 0; font-size: 22px; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 40px; }
        .box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }
        h2 { color: #2E4A7A; }
        .word-tag {
            display: inline-block;
            background: #f8d7da;
            color: #721c24;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
        }
        .word-tag a { color: #721c24; margin-left: 8px; text-decoration: none; font-weight: bold; }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            background-color: #2E4A7A;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover { background-color: #1a3357; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>College0 - Taboo Word Manager</h1>
        <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="box">
            <h2>Add a Taboo Word</h2>
            <form method="POST" action="/taboo/add">
                <input type="text" name="word" placeholder="Enter word to ban" required />
                <button type="submit">Add Word</button>
            </form>
        </div>

        <div class="box">
            <h2>Current Taboo Words</h2>
            {% if words %}
                {% for word in words %}
                <span class="word-tag">
                    {{ word }}
                    <a href="/taboo/remove/{{ word }}">✕</a>
                </span>
                {% endfor %}
            {% else %}
                <p>No taboo words have been added yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
